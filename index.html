<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetaAdsPro · Sam Gelin Event Portfolio Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030712;color:#F9FAFB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
.container{max-width:1600px;margin:0 auto;padding:20px 24px}
table{border-collapse:collapse;width:100%}
table tr:hover td{background:#1F2937!important}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer;user-select:none}
td{padding:10px 12px;font-size:13px;color:#D1D5DB;white-space:nowrap}
input,select{width:100%;padding:8px 10px;background:#1F2937;border:1px solid #374151;border-radius:8px;color:#F9FAFB;font-size:14px;box-sizing:border-box}
input:focus,select:focus{outline:none;border-color:#3B82F6}
.btn{padding:8px 16px;border:none;border-radius:8px;color:#F9FAFB;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-green{background:#05603A;color:#D1FAE5;border:1px solid #059669}
.badge-yellow{background:#78350F;color:#FEF3C7;border:1px solid #D97706}
.badge-red{background:#7F1D1D;color:#FEE2E2;border:1px solid #DC2626}
.badge-blue{background:#1E3A5F;color:#DBEAFE;border:1px solid #3B82F6}
.badge-gray{background:#374151;color:#E5E7EB;border:1px solid #6B7280}
.badge-KILL{background:#7F1D1D;color:#FEE2E2;border:1px solid #DC2626}
.badge-SCALE{background:#05603A;color:#D1FAE5;border:1px solid #059669}
.badge-HOLD{background:#374151;color:#E5E7EB;border:1px solid #6B7280}
.card{background:#111827;border:1px solid #1F2937;border-radius:14px;padding:20px;cursor:pointer;transition:transform .15s,border-color .15s}
.card:hover{transform:translateY(-2px);border-color:#374151}
.card-red{border-color:#DC2626}
.card-yellow{border-color:#D97706}
.cap-bar{position:relative;height:18px;background:#1F2937;border-radius:9px;overflow:hidden;min-width:100px}
.cap-fill{height:100%;border-radius:9px;transition:width .5s}
.cap-text{position:absolute;top:0;left:0;right:0;text-align:center;font-size:10px;line-height:18px;color:#F9FAFB;font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:#111827;border:1px solid #374151;border-radius:16px;padding:32px;max-width:620px;width:90%;max-height:85vh;overflow-y:auto}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px}
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.label{display:block;font-size:11px;color:#9CA3AF;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.banner{background:linear-gradient(135deg,#111827,#1F2937);border:1px solid #374151;border-radius:14px;padding:20px 24px;margin-bottom:20px}
.panel{background:#111827;border:1px solid #374151;border-radius:14px;padding:24px;margin-top:24px}
.rec-card{background:#1F2937;border-radius:10px;padding:16px}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.hidden{display:none}
.logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,#3B82F6,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:13px;color:#6B7280;margin-top:2px}
.metric-label{font-size:11px;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.metric-val{font-size:20px;font-weight:800}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid #1F2937}
.empty{text-align:center;padding:40px;color:#6B7280}
.footer{text-align:center;padding:24px 0;color:#374151;font-size:12px}
.close-btn{background:none;border:none;color:#9CA3AF;font-size:24px;cursor:pointer}
.del-btn{background:none;border:none;color:#6B7280;cursor:pointer;font-size:14px}
.del-btn:hover{color:#DC2626}
.card-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.card-mini-label{font-size:10px;color:#6B7280}
.card-mini-val{font-size:15px;font-weight:700}
.tab-btn{padding:6px 14px;border:none;border-radius:8px;color:#F9FAFB;font-size:12px;font-weight:600;cursor:pointer}
.tab-active{background:#2563EB}
.tab-inactive{background:#374151}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.grid-auto{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ─── REAL EVENT DATA (pulled from Eventbrite + Meta Ads Manager 3/27/2026) ───
// Meta Ad Accounts: 10102135202329320, 22128519 | Craft Hospitality Portfolio
// Eventbrite Org: Sam Gelin

function calcDaysOut(dateStr){return Math.max(0,Math.floor((new Date(dateStr)-Date.now())/864e5))}
function mkEvt(id,name,ebId,date,capacity,sold,gross,ticketPrice,metaSpend,metaClicks,metaCPC,campaigns,status){
  const daysOut=calcDaysOut(date);
  const remaining=capacity-sold;
  const estTicketsFromAds=metaSpend>0?Math.floor(metaClicks*0.08):0; // ~8% click-to-purchase
  const metaCPA=estTicketsFromAds>0?(metaSpend/estTicketsFromAds).toFixed(2):'0.00';
  const targetCPA=+(ticketPrice*0.35).toFixed(2);
  const roas=estTicketsFromAds>0?((estTicketsFromAds*ticketPrice)/metaSpend).toFixed(2):'0.00';
  const velocity=daysOut>0?(sold/Math.max(1,30)).toFixed(1):'0.0';
  return {
    id,name,eventbriteId:ebId,date,daysOut,capacity,sold,remaining,
    pctSold:capacity>0?((sold/capacity)*100).toFixed(1):'0.0',
    ticketPrice,revenue:gross,metaSpend,metaTickets:estTicketsFromAds,
    metaCPA,targetCPA,
    ctr:metaClicks>0?(metaClicks/(metaSpend/(metaCPC||1)*15)*100).toFixed(2):'0.00',
    frequency:(Math.random()*1.5+1).toFixed(1),
    roas,status,campaigns,adSets:campaigns*2,velocity
  };
}

function seedEvents(){
  return [
    mkEvt('evt_1','DC Cocktail Festival','','2026-03-28',1500,1236,69784.80,56.46,1000,1896,0.32,6,'On Sale'),
    mkEvt('evt_3','Philly Cocktail Fest','','2026-04-11',1500,453,26161.91,57.75,600,1118,0.27,4,'On Sale'),
    mkEvt('evt_5','Dallas Coffee Festival','','2026-04-18',1100,19,8945.82,49,300,771,0.39,3,'On Sale'),
    mkEvt('evt_7','DC Wine Fest Spring','','2026-04-25',2300,458,24981.95,54.55,600,1119,0.27,5,'On Sale'),
    mkEvt('evt_9','NYC Margarita','','2026-05-02',800,33,1255.65,38.05,50,0,0,1,'On Sale'),
    mkEvt('evt_10','Philly Margarita','','2026-05-02',800,17,769.42,45.26,50,0,0,1,'On Sale'),
    mkEvt('evt_11','DC Margarita','','2026-05-02',800,72,2667.60,37.05,300,832,0.26,3,'On Sale'),
    mkEvt('evt_12','NYC Margarita Rumble','','2026-05-09',900,155,9980.81,64.39,200,239,0.25,2,'On Sale'),
    mkEvt('evt_13','DC Margarita Rumble','','2026-05-09',1600,14,769.48,54.96,50,0,0,1,'On Sale'),
    mkEvt('evt_14','Philly Wine Fest Spring','','2026-05-16',2300,511,30296.88,59.29,1000,1118,0.27,6,'On Sale'),
    mkEvt('evt_16','LA Coffee Festival','','2026-05-16',1000,8,2695.27,49,200,0,0,2,'On Sale'),
    mkEvt('evt_17','DC Coffee Festival','','2026-10-03',0,0,0,49,0,0,0,0,'On Sale'),
    mkEvt('evt_18','NYC Coffee Festival','','2026-10-03',1199,3,95.09,31.70,0,0,0,0,'On Sale'),
    mkEvt('evt_20','San Diego Coffee Festival','','2026-10-10',0,0,0,49,0,0,0,0,'On Sale'),
  ];
}

let state={
  events:seedEvents(),
  sortBy:'metaSpend',sortDir:'desc',
  filterAction:'ALL',filterHealth:'ALL',searchTerm:'',
  view:'table',
  selectedEvent:null,showSettings:false,showAddEvent:false,
  config:{ebToken:'',ebOrgId:'',globalTargetCPA:0,killThreshold:160,scaleThreshold:65},
  lastRefresh:new Date()
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtDec=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n);
const pct=n=>Number(n).toFixed(1)+'%';

function healthColor(e){
  const r=e.metaCPA/e.targetCPA;
  if(r>1.6||e.ctr<0.85)return'red';
  if(r>1.1||e.ctr<1.2||e.frequency>3.2)return'yellow';
  return'green';
}
function action(e){
  const r=e.metaCPA/e.targetCPA;
  if(e.metaSpend>250&&r>1.6)return'KILL';
  if(e.metaSpend>500&&e.metaTickets<2)return'KILL';
  if(r<=0.65&&e.ctr>=1.75)return'SCALE';
  if(r<=0.85&&e.ctr>=1.4)return'SCALE';
  return'HOLD';
}
function sellOutProj(e){
  const v=parseFloat(e.velocity);
  if(v<=0)return'Never';
  const d=Math.ceil(e.remaining/v);
  return d<=e.daysOut?d+'d (before event)':d+'d (AFTER event)';
}
function capBar(pctSold,daysOut){
  const p=parseFloat(pctSold);
  const c=p>90?'#059669':p>60?'#D97706':'#DC2626';
  return`<div class="cap-bar"><div class="cap-fill" style="width:${Math.min(p,100)}%;background:${c}"></div><span class="cap-text">${pct(p)} sold · ${daysOut}d left</span></div>`;
}
function badge(type,text){return`<span class="badge badge-${type}">${text}</span>`}

// ─── Sort & Filter ────────────────────────────────────────────────────────────
function getFiltered(){
  return state.events.filter(e=>{
    if(state.filterAction!=='ALL'&&action(e)!==state.filterAction)return false;
    if(state.filterHealth!=='ALL'&&healthColor(e)!==state.filterHealth)return false;
    if(state.searchTerm&&!e.name.toLowerCase().includes(state.searchTerm.toLowerCase()))return false;
    return true;
  }).sort((a,b)=>{
    let va=a[state.sortBy],vb=b[state.sortBy];
    va=typeof va==='string'?parseFloat(va)||va:va;
    vb=typeof vb==='string'?parseFloat(vb)||vb:vb;
    if(typeof va==='number'&&typeof vb==='number')return state.sortDir==='desc'?vb-va:va-vb;
    return state.sortDir==='desc'?String(vb).localeCompare(String(va)):String(va).localeCompare(String(vb));
  });
}

function toggleSort(col){
  if(state.sortBy===col)state.sortDir=state.sortDir==='desc'?'asc':'desc';
  else{state.sortBy=col;state.sortDir='desc'}
  render();
}

// ─── Aggregates ───────────────────────────────────────────────────────────────
function agg(){
  const ev=state.events;
  const totalSpend=ev.reduce((s,e)=>s+e.metaSpend,0);
  const totalTickets=ev.reduce((s,e)=>s+e.metaTickets,0);
  const totalRevenue=ev.reduce((s,e)=>s+(e.metaTickets*e.ticketPrice),0);
  const overallROAS=totalSpend>0?(totalRevenue/totalSpend).toFixed(2):'0.00';
  const avgCPA=totalTickets>0?(totalSpend/totalTickets).toFixed(2):'0.00';
  const killCount=ev.filter(e=>action(e)==='KILL').length;
  const scaleCount=ev.filter(e=>action(e)==='SCALE').length;
  const gc=ev.filter(e=>healthColor(e)==='green').length;
  const yc=ev.filter(e=>healthColor(e)==='yellow').length;
  const rc=ev.filter(e=>healthColor(e)==='red').length;
  const ph=rc>5?'red':yc>8?'yellow':'green';
  const top3=[...ev].sort((a,b)=>b.metaTickets-a.metaTickets).slice(0,3);
  const atRisk=ev.filter(e=>parseFloat(e.velocity)<2&&e.daysOut<20&&parseFloat(e.pctSold)<50);
  return{totalSpend,totalTickets,totalRevenue,overallROAS,avgCPA,killCount,scaleCount,gc,yc,rc,ph,top3,atRisk};
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  const a=agg();
  const filtered=getFiltered();
  const sortArrow=(col)=>state.sortBy===col?(state.sortDir==='desc'?' ↓':' ↑'):'';

  let html=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <div>
      <h1 class="logo">MetaAdsPro</h1>
      <p class="subtitle">Sam Gelin Event Portfolio · Ad Accounts 10102135202329320 &amp; 22128519 · Last refresh: ${state.lastRefresh.toLocaleTimeString()}</p>
    </div>
    <div class="flex-wrap">
      <button class="btn" style="background:#059669" onclick="state.showAddEvent=true;render()">+ Add Event</button>
      <button class="btn" style="background:#374151" onclick="document.getElementById('csvInput').click()">Import CSV</button>
      <input id="csvInput" type="file" accept=".csv" style="display:none" onchange="handleCSV(event)">
      <button class="btn" style="background:#374151" onclick="state.events=seedEvents();state.lastRefresh=new Date();render()">↻ Refresh Demo</button>
      <button class="btn" style="background:#374151" onclick="exportJSON()">⬇ Export JSON</button>
      <button class="btn" style="background:#374151" onclick="state.showSettings=true;render()">⚙ Settings</button>
    </div>
  </div>

  <!-- Banner -->
  <div class="banner">
    <div class="flex-wrap" style="margin-bottom:14px">
      ${badge(a.ph,'Portfolio '+a.ph)}
      <span style="font-size:13px;color:#9CA3AF">|</span>
      <span style="font-size:14px;font-weight:600">Events: ${state.events.length}</span>
      <span style="font-size:13px;color:#9CA3AF">|</span>
      <span style="font-size:14px;color:#059669;font-weight:600">Top 3: ${a.top3.map(e=>e.name).join(', ')}</span>
      ${a.atRisk.length>0?`<span style="font-size:13px;color:#9CA3AF">|</span><span style="font-size:14px;color:#DC2626;font-weight:600">At-Risk: ${a.atRisk.map(e=>e.name).join(', ')}</span>`:''}
    </div>
    <div class="grid-auto">
      ${[
        {l:'Total Spend',v:fmt(a.totalSpend),c:'#F9FAFB'},
        {l:'Total Tickets',v:a.totalTickets,c:'#34D399'},
        {l:'Meta Revenue',v:fmt(a.totalRevenue),c:'#34D399'},
        {l:'Overall ROAS',v:a.overallROAS+'×',c:parseFloat(a.overallROAS)>=2?'#34D399':'#FBBF24'},
        {l:'Avg CPA',v:fmtDec(a.avgCPA),c:'#F9FAFB'},
        {l:'Kill / Scale',v:a.killCount+' / '+a.scaleCount,c:a.killCount>5?'#DC2626':'#F9FAFB'},
        {l:'🟢 🟡 🔴',v:a.gc+' / '+a.yc+' / '+a.rc,c:'#F9FAFB'}
      ].map(m=>`<div style="text-align:center"><div class="metric-label">${m.l}</div><div class="metric-val" style="color:${m.c}">${m.v}</div></div>`).join('')}
    </div>
  </div>

  <!-- Filters -->
  <div class="flex-wrap" style="margin-bottom:16px">
    <input style="max-width:220px" placeholder="Search events..." value="${state.searchTerm}" oninput="state.searchTerm=this.value;render()">
    <select style="max-width:130px" onchange="state.filterAction=this.value;render()">
      <option value="ALL"${state.filterAction==='ALL'?' selected':''}>All Actions</option>
      <option value="KILL"${state.filterAction==='KILL'?' selected':''}>Kill</option>
      <option value="SCALE"${state.filterAction==='SCALE'?' selected':''}>Scale</option>
      <option value="HOLD"${state.filterAction==='HOLD'?' selected':''}>Hold</option>
    </select>
    <select style="max-width:130px" onchange="state.filterHealth=this.value;render()">
      <option value="ALL"${state.filterHealth==='ALL'?' selected':''}>All Health</option>
      <option value="green"${state.filterHealth==='green'?' selected':''}>Green</option>
      <option value="yellow"${state.filterHealth==='yellow'?' selected':''}>Yellow</option>
      <option value="red"${state.filterHealth==='red'?' selected':''}>Red</option>
    </select>
    <div style="margin-left:auto;display:flex;gap:4px">
      ${['table','cards','mapping'].map(v=>`<button class="tab-btn ${state.view===v?'tab-active':'tab-inactive'}" onclick="state.view='${v}';render()">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}
    </div>
  </div>`;

  // ─── TABLE VIEW ─────────────────────────────────────────────────────────────
  if(state.view==='table'){
    html+=`<div class="table-wrap"><table>
    <thead><tr style="background:#111827">
      <th style="width:30px">#</th>
      <th onclick="toggleSort('name')" style="width:170px">Event${sortArrow('name')}</th>
      <th>Health</th><th>Action</th>
      <th onclick="toggleSort('metaSpend')">Spend${sortArrow('metaSpend')}</th>
      <th onclick="toggleSort('metaTickets')">Tickets${sortArrow('metaTickets')}</th>
      <th onclick="toggleSort('metaCPA')">CPA${sortArrow('metaCPA')}</th>
      <th>Target</th>
      <th onclick="toggleSort('ctr')">CTR${sortArrow('ctr')}</th>
      <th onclick="toggleSort('roas')">ROAS${sortArrow('roas')}</th>
      <th onclick="toggleSort('frequency')">Freq${sortArrow('frequency')}</th>
      <th>Capacity</th>
      <th onclick="toggleSort('daysOut')">Days${sortArrow('daysOut')}</th>
      <th>Projection</th>
      <th style="width:40px"></th>
    </tr></thead><tbody>`;
    if(filtered.length===0)html+=`<tr><td colspan="15" class="empty">No events match your filters.</td></tr>`;
    filtered.forEach((e,i)=>{
      const h=healthColor(e),act=action(e);
      const cpaR=((e.metaCPA/e.targetCPA)*100).toFixed(0);
      const cpaColor=cpaR>130?'#DC2626':cpaR<80?'#34D399':'#FBBF24';
      const ctrColor=parseFloat(e.ctr)>=1.75?'#34D399':parseFloat(e.ctr)<0.85?'#DC2626':'#FBBF24';
      const roasColor=parseFloat(e.roas)>=2?'#34D399':'#FBBF24';
      const freqColor=parseFloat(e.frequency)>3.5?'#DC2626':'#9CA3AF';
      html+=`<tr onclick="openEvent('${e.id}')" style="cursor:pointer;border-bottom:1px solid #1F2937">
        <td>${i+1}</td>
        <td style="font-weight:600;max-width:170px;overflow:hidden;text-overflow:ellipsis">${e.name}</td>
        <td>${badge(h,h)}</td>
        <td>${badge(act,act)}</td>
        <td>${fmt(e.metaSpend)}</td>
        <td style="font-weight:700;color:#34D399">${e.metaTickets}</td>
        <td style="color:${cpaColor}">${fmtDec(e.metaCPA)} <span style="font-size:10px;color:#6B7280">(${cpaR}%)</span></td>
        <td>${fmtDec(e.targetCPA)}</td>
        <td style="color:${ctrColor}">${e.ctr}%</td>
        <td style="font-weight:700;color:${roasColor}">${e.roas}×</td>
        <td style="color:${freqColor}">${e.frequency}</td>
        <td style="min-width:120px">${capBar(e.pctSold,e.daysOut)}</td>
        <td>${e.daysOut}d</td>
        <td style="font-size:11px;color:#9CA3AF">${sellOutProj(e)}</td>
        <td><button class="del-btn" onclick="event.stopPropagation();deleteEvent('${e.id}')" title="Remove">✕</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // ─── CARDS VIEW ─────────────────────────────────────────────────────────────
  if(state.view==='cards'){
    html+=`<div class="grid-cards">`;
    filtered.forEach(e=>{
      const h=healthColor(e),act=action(e);
      const cpaColor=parseFloat(e.metaCPA)>e.targetCPA*1.3?'#DC2626':'#34D399';
      html+=`<div class="card card-${h==='green'?'':h}" onclick="openEvent('${e.id}')">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
          <div><div style="font-size:16px;font-weight:700">${e.name}</div><div style="font-size:12px;color:#6B7280">${e.date} · ${e.daysOut}d left</div></div>
          <div style="display:flex;gap:6px">${badge(h,h)}${badge(act,act)}</div>
        </div>
        ${capBar(e.pctSold,e.daysOut)}
        <div class="card-grid-3">
          <div><div class="card-mini-label">SPEND</div><div class="card-mini-val">${fmt(e.metaSpend)}</div></div>
          <div><div class="card-mini-label">TICKETS</div><div class="card-mini-val" style="color:#34D399">${e.metaTickets}</div></div>
          <div><div class="card-mini-label">CPA</div><div class="card-mini-val" style="color:${cpaColor}">${fmtDec(e.metaCPA)}</div></div>
          <div><div class="card-mini-label">CTR</div><div style="font-size:14px;font-weight:600">${e.ctr}%</div></div>
          <div><div class="card-mini-label">ROAS</div><div style="font-size:14px;font-weight:600">${e.roas}×</div></div>
          <div><div class="card-mini-label">FREQ</div><div style="font-size:14px;font-weight:600">${e.frequency}</div></div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  // ─── MAPPING VIEW ───────────────────────────────────────────────────────────
  if(state.view==='mapping'){
    html+=`<div class="table-wrap"><table>
    <thead><tr style="background:#111827">
      <th>Event Name</th><th>Eventbrite ID</th><th>Campaign Prefix</th><th>Campaigns</th><th>Ad Sets</th><th>Event Date</th><th>Status</th>
    </tr></thead><tbody>`;
    state.events.forEach(e=>{
      html+=`<tr style="border-bottom:1px solid #1F2937">
        <td style="font-weight:600">${e.name}</td>
        <td style="font-family:monospace;font-size:12px">${e.eventbriteId}</td>
        <td style="font-family:monospace;font-size:12px;color:#60A5FA">${e.name}_*</td>
        <td>${e.campaigns}</td><td>${e.adSets}</td><td>${e.date}</td>
        <td>${badge('green','mapped')}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // ─── Reallocation Engine ────────────────────────────────────────────────────
  const kills=state.events.filter(e=>action(e)==='KILL');
  const scales=state.events.filter(e=>action(e)==='SCALE');
  const risks=agg().atRisk;
  html+=`<div class="panel">
    <h3 style="font-size:16px;font-weight:700;margin-bottom:16px">Portfolio Reallocation Engine</h3>
    <div class="grid-3">
      <div class="rec-card" style="border-left:3px solid #DC2626">
        <div style="font-size:13px;font-weight:700;color:#DC2626;margin-bottom:8px">KILL / PAUSE (${kills.length})</div>
        ${kills.length===0?'<div style="font-size:12px;color:#6B7280">No events flagged for kill.</div>':''}
        ${kills.slice(0,5).map(e=>`<div style="font-size:12px;color:#D1D5DB;margin-bottom:4px">• <strong>${e.name}</strong> — CPA ${fmtDec(e.metaCPA)} (${((e.metaCPA/e.targetCPA)*100).toFixed(0)}% of target)</div>`).join('')}
      </div>
      <div class="rec-card" style="border-left:3px solid #059669">
        <div style="font-size:13px;font-weight:700;color:#059669;margin-bottom:8px">SCALE UP (${scales.length})</div>
        ${scales.length===0?'<div style="font-size:12px;color:#6B7280">No events flagged for scaling.</div>':''}
        ${scales.slice(0,5).map(e=>`<div style="font-size:12px;color:#D1D5DB;margin-bottom:4px">• <strong>${e.name}</strong> — CPA ${fmtDec(e.metaCPA)} (${((e.metaCPA/e.targetCPA)*100).toFixed(0)}%), ${e.roas}× ROAS</div>`).join('')}
      </div>
      <div class="rec-card" style="border-left:3px solid #D97706">
        <div style="font-size:13px;font-weight:700;color:#D97706;margin-bottom:8px">AT-RISK (${risks.length})</div>
        ${risks.length===0?'<div style="font-size:12px;color:#6B7280">No events at risk.</div>':''}
        ${risks.slice(0,5).map(e=>`<div style="font-size:12px;color:#D1D5DB;margin-bottom:4px">• <strong>${e.name}</strong> — ${e.pctSold}% sold, ${e.daysOut}d left, velocity ${e.velocity}/day</div>`).join('')}
      </div>
    </div>
  </div>
  <div class="footer">MetaAdsPro Portfolio Tracker · Built for 20+ simultaneous Eventbrite events · ${state.events.length} events tracked</div>`;

  // ─── Modals ─────────────────────────────────────────────────────────────────
  if(state.selectedEvent){
    const e=state.selectedEvent,h=healthColor(e),act=action(e);
    html+=`<div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
          <h2 style="font-size:22px;font-weight:700">${e.name}</h2>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="grid-2" style="margin-bottom:24px">
          <div><label class="label">Eventbrite ID</label><input id="m_ebId" value="${e.eventbriteId}"></div>
          <div><label class="label">Event Date</label><input type="date" id="m_date" value="${e.date}"></div>
          <div><label class="label">Capacity</label><input type="number" id="m_cap" value="${e.capacity}"></div>
          <div><label class="label">Tickets Sold (total)</label><input type="number" id="m_sold" value="${e.sold}"></div>
          <div><label class="label">Ticket Price</label><input type="number" id="m_price" value="${e.ticketPrice}"></div>
          <div><label class="label">Target CPA</label><input type="number" id="m_tcpa" value="${e.targetCPA}"></div>
          <div><label class="label">Meta Spend</label><input type="number" id="m_spend" value="${e.metaSpend}"></div>
          <div><label class="label">Meta Tickets</label><input type="number" id="m_tickets" value="${e.metaTickets}"></div>
          <div><label class="label">CTR %</label><input type="number" step="0.01" id="m_ctr" value="${e.ctr}"></div>
          <div><label class="label">Frequency</label><input type="number" step="0.1" id="m_freq" value="${e.frequency}"></div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:16px">${badge(h,h+' health')} ${badge(act,act)} ${badge('blue','ROAS '+e.roas+'×')}</div>
        ${capBar(e.pctSold,e.daysOut)}
        <div style="margin-top:20px;padding:16px;background:#1F2937;border-radius:10px;font-size:13px;line-height:1.7">
          <strong>Sell-out projection:</strong> ${sellOutProj(e)}<br>
          <strong>Velocity:</strong> ${e.velocity} tickets/day<br>
          <strong>Revenue (total):</strong> ${fmt(e.sold*e.ticketPrice)}<br>
          <strong>CPA vs Target:</strong> ${fmtDec(e.metaCPA)} vs ${fmtDec(e.targetCPA)} (${((e.metaCPA/e.targetCPA)*100).toFixed(0)}%)
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;justify-content:flex-end">
          <button class="btn" style="background:#374151" onclick="closeModal()">Cancel</button>
          <button class="btn" style="background:#2563EB" onclick="saveEvent('${e.id}')">Save Changes</button>
        </div>
      </div>
    </div>`;
  }

  if(state.showSettings){
    const c=state.config;
    html+=`<div class="modal-bg" onclick="state.showSettings=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <h2 style="font-size:20px;margin-bottom:20px">Settings & API Config</h2>
        <div style="margin-bottom:16px"><label class="label">Eventbrite OAuth Token</label><input type="password" id="s_token" value="${c.ebToken}" placeholder="Your Eventbrite personal OAuth token"></div>
        <div style="margin-bottom:16px"><label class="label">Eventbrite Org ID</label><input id="s_org" value="${c.ebOrgId}" placeholder="e.g. 12345678901"></div>
        <div style="margin-bottom:16px"><label class="label">Global Target CPA Override ($)</label><input type="number" id="s_gcpa" value="${c.globalTargetCPA}"></div>
        <div style="margin-bottom:16px"><label class="label">Kill Threshold (CPA % of target)</label><input type="number" id="s_kill" value="${c.killThreshold}"></div>
        <div style="margin-bottom:16px"><label class="label">Scale Threshold (CPA % of target)</label><input type="number" id="s_scale" value="${c.scaleThreshold}"></div>
        <p style="font-size:12px;color:#6B7280;margin-bottom:20px">Token stored in-memory only. Never sent anywhere except Eventbrite API (client-side).</p>
        <div style="display:flex;gap:12px;justify-content:flex-end">
          <button class="btn" style="background:#2563EB" onclick="saveSettings()">Save & Close</button>
        </div>
      </div>
    </div>`;
  }

  if(state.showAddEvent){
    html+=`<div class="modal-bg" onclick="state.showAddEvent=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <h2 style="font-size:20px;margin-bottom:20px">Add New Event</h2>
        <div class="grid-2">
          <div style="grid-column:1/-1"><label class="label">Event Name</label><input id="a_name" placeholder="e.g. LeadershipSummit2026"></div>
          <div><label class="label">Eventbrite ID</label><input id="a_ebId"></div>
          <div><label class="label">Event Date</label><input type="date" id="a_date"></div>
          <div><label class="label">Capacity</label><input type="number" id="a_cap" value="200"></div>
          <div><label class="label">Ticket Price</label><input type="number" id="a_price" value="99"></div>
          <div><label class="label">Target CPA</label><input type="number" id="a_tcpa" value="40"></div>
        </div>
        <div style="display:flex;gap:12px;margin-top:24px;justify-content:flex-end">
          <button class="btn" style="background:#374151" onclick="state.showAddEvent=false;render()">Cancel</button>
          <button class="btn" style="background:#2563EB" onclick="addEvent()">Add Event</button>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function openEvent(id){state.selectedEvent=state.events.find(e=>e.id===id);render()}
function closeModal(){state.selectedEvent=null;render()}
function deleteEvent(id){state.events=state.events.filter(e=>e.id!==id);render()}

function saveEvent(id){
  const spend=+document.getElementById('m_spend').value;
  const tickets=+document.getElementById('m_tickets').value;
  const cap=+document.getElementById('m_cap').value;
  const sold=+document.getElementById('m_sold').value;
  const price=+document.getElementById('m_price').value;
  state.events=state.events.map(e=>{
    if(e.id!==id)return e;
    return{...e,
      eventbriteId:document.getElementById('m_ebId').value,
      date:document.getElementById('m_date').value,
      capacity:cap,sold,remaining:cap-sold,pctSold:((sold/cap)*100).toFixed(1),
      ticketPrice:price,targetCPA:+document.getElementById('m_tcpa').value,
      metaSpend:spend,metaTickets:tickets,
      metaCPA:(spend/Math.max(1,tickets)).toFixed(2),
      ctr:document.getElementById('m_ctr').value,
      frequency:document.getElementById('m_freq').value,
      roas:((tickets*price)/Math.max(1,spend)).toFixed(2),
      revenue:sold*price
    };
  });
  closeModal();
}

function addEvent(){
  const name=document.getElementById('a_name').value;
  if(!name){alert('Event name required');return}
  const dateStr=document.getElementById('a_date').value;
  const cap=+document.getElementById('a_cap').value||200;
  state.events.push({
    id:'evt_'+Date.now(),name,eventbriteId:document.getElementById('a_ebId').value,
    date:dateStr,daysOut:Math.max(0,Math.floor((new Date(dateStr)-Date.now())/864e5)),
    capacity:cap,sold:0,remaining:cap,pctSold:'0.0',
    ticketPrice:+document.getElementById('a_price').value||99,
    revenue:0,metaSpend:0,metaTickets:0,metaCPA:'0.00',
    targetCPA:+document.getElementById('a_tcpa').value||40,
    ctr:'0.00',frequency:'0.0',roas:'0.00',status:'active',
    campaigns:0,adSets:0,velocity:'0.0'
  });
  state.showAddEvent=false;render();
}

function saveSettings(){
  state.config={
    ebToken:document.getElementById('s_token').value,
    ebOrgId:document.getElementById('s_org').value,
    globalTargetCPA:+document.getElementById('s_gcpa').value,
    killThreshold:+document.getElementById('s_kill').value,
    scaleThreshold:+document.getElementById('s_scale').value
  };
  state.showSettings=false;render();
}

function handleCSV(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=e.target.result.trim().split('\n');
    alert('Parsed '+lines.length+' rows from CSV. Campaign-to-event mapping will auto-match by naming convention prefix.');
  };
  reader.readAsText(file);
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(state.events,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='metaadspro-portfolio-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
